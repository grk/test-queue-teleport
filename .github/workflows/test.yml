name: Test Teleport
on: push

jobs:
  gem-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: gem
      - run: cd gem && bundle exec rake test

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd worker && bun install && bun run test

  integration-master:
    runs-on: ubuntu-latest
    needs: [gem-tests, worker-tests]
    env:
      TQ_TELEPORT_URL: ${{ secrets.TQ_TELEPORT_URL }}
      TQ_TELEPORT_API_KEY: ${{ secrets.TQ_TELEPORT_API_KEY }}
      TQ_TELEPORT_ENCRYPTION_KEY: ${{ secrets.TQ_TELEPORT_ENCRYPTION_KEY }}
      TQ_TELEPORT_RUN_ID: "${{ github.run_id }}-${{ github.run_attempt }}"
      TEST_QUEUE_SPLIT_GROUPS: "1"
      TEST_QUEUE_WORKERS: "1"
      TQ_TELEPORT_DEBUG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: test-project
      - run: cd test-project && bundle exec tq-teleport serve -- bundle exec rspec-queue
        timeout-minutes: 5

  integration-workers:
    runs-on: ubuntu-latest
    needs: [gem-tests, worker-tests]
    strategy:
      matrix:
        worker: [0, 1]
      fail-fast: false
    env:
      TQ_TELEPORT_URL: ${{ secrets.TQ_TELEPORT_URL }}
      TQ_TELEPORT_API_KEY: ${{ secrets.TQ_TELEPORT_API_KEY }}
      TQ_TELEPORT_ENCRYPTION_KEY: ${{ secrets.TQ_TELEPORT_ENCRYPTION_KEY }}
      TQ_TELEPORT_RUN_ID: "${{ github.run_id }}-${{ github.run_attempt }}"
      TEST_QUEUE_SPLIT_GROUPS: "1"
      TQ_TELEPORT_DEBUG: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: test-project
      - run: cd test-project && bundle exec tq-teleport connect -- bundle exec rspec-queue
